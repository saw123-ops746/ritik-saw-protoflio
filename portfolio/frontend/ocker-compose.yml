version: "3.9"

services:

  backend:
    build: ./backend

    container_name: portfolio_backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres

  postgres:

    image: postgres:16

    container_name: portfolio_postgres

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: admin123

      POSTGRES_DB: portfolio_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: